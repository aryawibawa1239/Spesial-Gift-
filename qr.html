<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Hadiah Spesial</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
      }
      .qr-page {
        max-width: 420px;
        width: 100%;
        background: var(--card);
        border-radius: 24px;
        padding: 2rem;
        box-shadow: var(--shadow);
        text-align: center;
      }
      .qr-page h1 {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        color: var(--accent);
        margin-bottom: 0.5rem;
      }
      .qr-page .hint {
        font-size: 0.9rem;
        opacity: 0.85;
        margin-bottom: 1.25rem;
        line-height: 1.5;
      }
      #qrImage {
        width: 280px;
        height: 280px;
        border-radius: 12px;
        background: #fff;
        padding: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      .url-box {
        margin: 1rem 0;
        font-size: 0.82rem;
        word-break: break-all;
        background: var(--accent-soft);
        padding: 0.75rem;
        border-radius: 10px;
        text-align: left;
      }
      .status-ok {
        color: #15803d;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }
      .status-warn {
        color: #b45309;
        font-weight: 700;
        margin-bottom: 0.75rem;
        line-height: 1.4;
      }
      label {
        display: block;
        text-align: left;
        font-size: 0.85rem;
        font-weight: 700;
        margin: 1rem 0 0.35rem;
      }
      input[type="url"] {
        width: 100%;
        padding: 0.65rem 0.75rem;
        border: 2px solid var(--accent-soft);
        border-radius: 10px;
        font-family: inherit;
        font-size: 0.9rem;
      }
      .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
        margin-top: 1rem;
      }
      .btn-secondary {
        background: var(--accent-soft);
        color: var(--accent);
      }
      a.back {
        display: inline-block;
        margin-top: 1.25rem;
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body data-theme="pink">
    <div class="qr-page">
      <h1>QR Hadiah Spesial 📱</h1>
      <p class="hint">Scan dengan kamera HP. Pastikan URL diawali <strong>http://</strong> atau <strong>https://</strong> (bukan file://).</p>

      <p id="status" class="status-warn">Memuat...</p>

      <img id="qrImage" alt="QR Code hadiah" width="280" height="280" />

      <p class="url-box" id="urlBox"></p>

      <label for="urlInput">Ubah URL (setelah upload ke Netlify, dll.)</label>
      <input type="url" id="urlInput" placeholder="https://nama-situs.netlify.app" />

      <div class="btn-row">
        <button type="button" class="btn" id="btnRefresh">Perbarui QR</button>
        <button type="button" class="btn btn-secondary" id="btnDownload">Unduh PNG</button>
      </div>

      <a class="back" href="index.html">← Kembali ke hadiah</a>
    </div>

    <script>
      (function () {
        var qrImg = document.getElementById("qrImage");
        var urlBox = document.getElementById("urlBox");
        var urlInput = document.getElementById("urlInput");
        var status = document.getElementById("status");

        function isScannable(url) {
          return /^https?:\/\/.+/i.test(url);
        }

        function qrApiUrl(target) {
          return (
            "https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=12&data=" +
            encodeURIComponent(target)
          );
        }

        function setQr(target) {
          if (!isScannable(target)) {
            status.className = "status-warn";
            status.textContent =
              "URL belum valid. Jalankan JALANKAN.bat atau tempel link Netlify (https://...).";
            urlBox.textContent = target || "(kosong)";
            return;
          }

          status.className = "status-ok";
          status.textContent = "✓ QR siap discan — arahkan kamera HP ke gambar ini";
          urlBox.textContent = target;
          urlInput.value = target;
          qrImg.src = qrApiUrl(target);
        }

        document.getElementById("btnRefresh").onclick = function () {
          var v = urlInput.value.trim();
          if (v) setQr(v);
        };

        document.getElementById("btnDownload").onclick = function () {
          var v = urlInput.value.trim();
          if (!isScannable(v)) {
            alert("Isi URL yang valid dulu (http:// atau https://)");
            return;
          }
          var a = document.createElement("a");
          a.href = qrApiUrl(v);
          a.download = "qr-hadiah-spesial.png";
          a.click();
        };

        function init() {
          var current = window.location.origin + window.location.pathname.replace(/qr\.html$/i, "index.html");

          if (isScannable(current)) {
            setQr(current);
            return;
          }

          fetch("share-url.json")
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data && data.url) setQr(data.url);
              else setQr("");
            })
            .catch(function () {
              status.className = "status-warn";
              status.textContent =
                "Double-click JALANKAN.bat di folder proyek, lalu buka halaman ini lagi.";
              urlBox.textContent =
                "Atau upload ke https://app.netlify.com/drop lalu tempel URL di bawah.";
            });
        }

        init();
      })();
    </script>
  </body>
</html>
